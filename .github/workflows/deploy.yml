name: Deploy to Remote Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        if [ -z "$SSH_KEY" ]; then
          echo "SSH_KEY secret is not set. Aborting deployment."
          exit 1
        fi
        if [ -z "$HOST" ]; then
          echo "HOST secret is not set. Aborting deployment."
          exit 1
        fi
        mkdir -p ~/.ssh
        echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>&1
        if [ ! -s ~/.ssh/known_hosts ]; then
          echo "ssh-keyscan failed: could not reach $HOST. Check HOST secret and server firewall."
          exit 1
        fi
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
        HOST: ${{ secrets.HOST }}

    - name: Navigate to project and pull latest changes
      env:
        DEPLOY_USER: ${{ secrets.USER }}
        DEPLOY_HOST: ${{ secrets.HOST }}
        DEPLOY_PATH: ${{ secrets.PROJECT_PATH }}
      run: |
        CLEAN_USER=$(echo "$DEPLOY_USER" | tr -d '\n\r')
        CLEAN_HOST=$(echo "$DEPLOY_HOST" | tr -d '\n\r')
        CLEAN_PATH=$(echo "$DEPLOY_PATH" | tr -d '\n\r')
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          "${CLEAN_USER}@${CLEAN_HOST}" \
          "cd ${CLEAN_PATH} && git pull origin main"

    - name: Deploy MCP, API, and Web Projects with Docker Compose
      env:
        DEPLOY_USER: ${{ secrets.USER }}
        DEPLOY_HOST: ${{ secrets.HOST }}
        DEPLOY_PATH: ${{ secrets.PROJECT_PATH }}
      run: |
        CLEAN_USER=$(echo "$DEPLOY_USER" | tr -d '\n\r')
        CLEAN_HOST=$(echo "$DEPLOY_HOST" | tr -d '\n\r')
        CLEAN_PATH=$(echo "$DEPLOY_PATH" | tr -d '\n\r')
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          "${CLEAN_USER}@${CLEAN_HOST}" \
          "cd ${CLEAN_PATH} && docker compose up -d --build mcp api web && docker compose ps --filter 'status=running' | grep -E 'mcp|api|web' || { echo 'One or more services failed to start'; exit 1; }"

    - name: Cleanup dangling Docker images
      env:
        DEPLOY_USER: ${{ secrets.USER }}
        DEPLOY_HOST: ${{ secrets.HOST }}
      run: |
        CLEAN_USER=$(echo "$DEPLOY_USER" | tr -d '\n\r')
        CLEAN_HOST=$(echo "$DEPLOY_HOST" | tr -d '\n\r')
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
          "${CLEAN_USER}@${CLEAN_HOST}" \
          "docker image prune -f"
