name: Deploy to Remote Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        if [ -z "$SSH_KEY" ]; then
          echo "SSH_KEY secret is not set. Aborting deployment."
          exit 1
        fi
        if [ -z "$HOST" ]; then
          echo "HOST secret is not set. Aborting deployment."
          exit 1
        fi
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>&1
        if [ ! -s ~/.ssh/known_hosts ]; then
          echo "ssh-keyscan failed: could not reach $HOST. Check HOST secret and server firewall."
          exit 1
        fi
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
        HOST: ${{ secrets.HOST }}

    - name: Navigate to project and pull latest changes
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          ${{ secrets.USER }}@${{ secrets.HOST }} \
          "cd ${{ secrets.PROJECT_PATH }} && git pull origin main"

    - name: Deploy MCP, API, and Web Projects with Docker Compose
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          ${{ secrets.USER }}@${{ secrets.HOST }} \
          "cd ${{ secrets.PROJECT_PATH }} && docker compose up -d --build mcp api web && docker compose ps --filter 'status=running' | grep -E 'mcp|api|web' || { echo 'One or more services failed to start'; exit 1; }"

    - name: Cleanup dangling Docker images
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          ${{ secrets.USER }}@${{ secrets.HOST }} \
          "docker image prune -f"
